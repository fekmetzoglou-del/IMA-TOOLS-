<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NN Single Flex – Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{--or:#E8620A;--or2:#c94d00;--dk:#1a1a1a;--lt:#f5f4f1;--wh:#ffffff;--gr:#888888;--bd:#e2e0db;--gn:#2d7d46;--rd:#c0392b;--bl:#3498db;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--lt);color:var(--dk);min-height:100vh;}

.header{background:var(--dk);padding:16px 40px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:200;box-shadow:0 2px 20px rgba(0,0,0,.3);}
.h-logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:var(--or);}
.h-sub{font-size:11px;color:#aaa;letter-spacing:2px;text-transform:uppercase;border-left:1px solid #444;padding-left:14px;}
.h-spacer{flex:1;}
.lang-toggle{display:flex;gap:0;border:1.5px solid #444;border-radius:8px;overflow:hidden;}
.lang-btn{padding:7px 14px;background:transparent;border:none;color:#aaa;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:1px;}
.lang-btn.active{background:var(--or);color:#fff;}
.lang-btn:hover:not(.active){background:#2a2a2a;color:#fff;}

.main{max-width:1320px;margin:0 auto;padding:24px 20px;display:grid;grid-template-columns:340px 1fr;gap:20px;align-items:start;}

.inp{background:var(--wh);border-radius:18px;padding:22px 18px;box-shadow:0 4px 28px rgba(0,0,0,.07);position:sticky;top:70px;}
.pt{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.pt::after{content:'';flex:1;height:2px;background:var(--or);}
.fg{margin-bottom:14px;}
.fl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gr);margin-bottom:5px;display:block;}
.fi{width:100%;padding:10px 12px;border:1.5px solid var(--bd);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:var(--dk);background:var(--lt);transition:all .2s;outline:none;}
.fi:focus{border-color:var(--or);background:var(--wh);box-shadow:0 0 0 3px rgba(232,98,10,.08);}
.fh{font-size:10px;color:var(--gr);margin-top:3px;}

.period-sel{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:14px;}
.ps-btn{padding:9px 4px;border:1.5px solid var(--bd);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--gr);background:var(--lt);cursor:pointer;text-align:center;transition:all .2s;}
.ps-btn.active{border-color:var(--or);color:var(--or);background:#fff8f5;}
.ps-btn:hover:not(.active){border-color:var(--or);color:var(--or);}

.sw{background:var(--lt);border-radius:10px;padding:11px;margin-bottom:14px;}
.sr{display:flex;align-items:center;gap:10px;margin-top:6px;}
input[type=range]{flex:1;accent-color:var(--or);cursor:pointer;}
.sv{font-size:14px;font-weight:600;color:var(--or);min-width:30px;text-align:right;}

.gb{width:100%;padding:13px;background:var(--or);color:var(--wh);border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .25s;margin-top:2px;}
.gb:hover{background:var(--or2);transform:translateY(-2px);box-shadow:0 8px 22px rgba(232,98,10,.35);}

.exp-panel{display:none;background:var(--wh);border-radius:14px;padding:13px 16px;margin-top:10px;box-shadow:0 2px 14px rgba(0,0,0,.06);}
.exp-panel.on{display:block;}
.ep-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gr);margin-bottom:9px;}
.ep-btns{display:flex;gap:7px;}
.ep-btn{flex:1;padding:11px 6px;border:none;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .2s;}
.ep-btn:hover{transform:translateY(-2px);}
.ep-btn:disabled{opacity:.55;cursor:wait;transform:none!important;}
.ep-pptx{background:#C43E1C;color:#fff;}
.ep-pptx:hover{background:#a33517;box-shadow:0 5px 18px rgba(196,62,28,.35);}
.ep-pdf{background:#1a5276;color:#fff;}
.ep-pdf:hover{background:#154360;box-shadow:0 5px 18px rgba(26,82,118,.35);}

.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:440px;text-align:center;}
.phi{font-size:64px;opacity:.15;margin-bottom:16px;}
.pht{font-size:20px;font-family:'Playfair Display',serif;font-weight:700;color:#bbb;}
.phs{font-size:13px;color:#ccc;margin-top:6px;}

.cc{background:var(--dk);border-radius:18px;padding:20px 24px;color:#fff;margin-bottom:16px;position:relative;overflow:hidden;}
.cc::before{content:'NN';position:absolute;right:-6px;top:-16px;font-family:'Playfair Display',serif;font-size:120px;font-weight:900;color:rgba(232,98,10,.07);line-height:1;pointer-events:none;}
.ctag{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--or);font-weight:600;margin-bottom:3px;}
.cname{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:12px;}
.cstats{display:flex;gap:20px;flex-wrap:wrap;}
.cv{font-size:19px;font-weight:700;color:var(--or);line-height:1;}
.cl{font-size:10px;color:#aaa;margin-top:2px;}

.pb{background:linear-gradient(135deg,var(--or),var(--or2));border-radius:18px;padding:18px 24px;color:#fff;margin-bottom:16px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.pm{flex:1;}
.ptag{font-size:10px;letter-spacing:2px;text-transform:uppercase;opacity:.8;margin-bottom:3px;}
.pamt{font-family:'Playfair Display',serif;font-size:40px;font-weight:900;line-height:1;}
.psub{font-size:11px;opacity:.75;margin-top:3px;}
.pann{text-align:center;background:rgba(255,255,255,.16);border-radius:12px;padding:11px 16px;}
.pav{font-size:21px;font-weight:700;}
.pal{font-size:10px;opacity:.75;margin-top:2px;}

.st{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;margin-bottom:13px;display:flex;align-items:center;gap:8px;}
.badge{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;background:rgba(232,98,10,.1);color:var(--or);padding:2px 8px;border-radius:20px;}

.scg{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
.sc{background:var(--wh);border-radius:14px;padding:16px 14px;box-shadow:0 4px 16px rgba(0,0,0,.07);border-top:3px solid transparent;transition:transform .2s;}
.sc:hover{transform:translateY(-3px);}
.sc.low{border-top-color:var(--bl);}.sc.mid{border-top-color:var(--or);}.sc.hi{border-top-color:var(--gn);}
.sc-lb{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:9px;display:block;}
.low .sc-lb{color:var(--bl);}.mid .sc-lb{color:var(--or);}.hi .sc-lb{color:var(--gn);}
.sc-r{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;line-height:1;margin-bottom:2px;}
.low .sc-r{color:var(--bl);}.mid .sc-r{color:var(--or);}.hi .sc-r{color:var(--gn);}
.sc-rs{font-size:10px;color:var(--gr);margin-bottom:12px;}
.sc-row{display:flex;justify-content:space-between;align-items:flex-end;padding:6px 0;border-bottom:1px solid var(--bd);}
.sc-row:last-child{border-bottom:none;}
.sc-rl{font-size:10px;color:var(--gr);max-width:55%;}
.sc-rv{font-size:13px;font-weight:700;color:var(--dk);}
.sc-rv.g{color:var(--gn);}.sc-rv.o{color:var(--or);}

.chc{background:var(--wh);border-radius:18px;padding:20px 24px;box-shadow:0 4px 16px rgba(0,0,0,.07);margin-bottom:16px;}

.ret-wrap{background:var(--wh);border-radius:18px;padding:20px 24px;box-shadow:0 4px 16px rgba(0,0,0,.07);margin-bottom:16px;overflow-x:auto;}
.rt{width:100%;border-collapse:collapse;font-size:13px;}
.rt th{text-align:left;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gr);padding:0 10px 10px 0;border-bottom:2px solid var(--bd);}
.rt td{padding:9px 10px 9px 0;border-bottom:1px solid var(--bd);font-weight:500;}
.rt tr:last-child td{border-bottom:none;}
.rt .low-c{color:var(--bl);font-weight:700;}.rt .mid-c{color:var(--or);font-weight:700;}.rt .hi-c{color:var(--gn);font-weight:700;}.rt .rd-c{color:var(--rd);}
.rt .yr-l{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;}

.ic2{background:#fff5f3;border:1.5px solid #ffd5c8;border-radius:18px;padding:18px 22px;margin-bottom:16px;}
.icmp{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ib{background:var(--wh);border-radius:11px;padding:13px;text-align:center;}
.ibv{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;margin-bottom:2px;}
.ibl{font-size:10px;color:var(--gr);}
.iyg{margin-top:10px;display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
.iyc{background:var(--wh);border-radius:9px;padding:8px 4px;text-align:center;}
.iy-yr{font-size:10px;color:var(--gr);font-weight:600;}
.iy-rv{font-size:12px;font-weight:700;color:var(--rd);}
.iy-ls{font-size:9px;color:var(--gr);}

.bbc{background:var(--wh);border-radius:18px;padding:20px 24px;box-shadow:0 4px 16px rgba(0,0,0,.07);margin-bottom:16px;}
.bbt{width:100%;border-collapse:collapse;font-size:13px;}
.bbt th{text-align:left;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gr);padding:0 0 9px;border-bottom:2px solid var(--bd);}
.bbt td{padding:8px 0;border-bottom:1px solid var(--bd);font-weight:500;}
.bbt tr:last-child td{border-bottom:none;}
.bbt .bp{color:var(--or);font-weight:700;}

.ig{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.icard{background:var(--wh);border-radius:14px;padding:14px;box-shadow:0 4px 12px rgba(0,0,0,.06);}
.ict{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gr);margin-bottom:4px;}
.icv{font-size:13px;font-weight:700;color:var(--dk);}
.icd{font-size:10px;color:var(--gr);margin-top:3px;line-height:1.5;}

.disc{background:var(--wh);border-radius:12px;padding:13px 16px;font-size:10px;color:var(--gr);line-height:1.7;box-shadow:0 2px 10px rgba(0,0,0,.04);}

@media(max-width:880px){.main{grid-template-columns:1fr;}.inp{position:static;}.scg{grid-template-columns:1fr;}.icmp{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="header">
  <div class="h-logo">NN Single Flex</div>
  <div class="h-sub" id="hSub">Generator Παρουσίασης</div>
  <div class="h-spacer"></div>
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('el',this)">🇬🇷 ΕΛ</button>
    <button class="lang-btn" onclick="setLang('en',this)">🇬🇧 EN</button>
  </div>
</div>

<div class="main">
  <div>
    <div class="inp">
      <div class="pt" id="ptitle">Στοιχεία πελάτη</div>

      <div class="fg">
        <label class="fl" id="l-name">Ονοματεπώνυμο</label>
        <input class="fi" type="text" id="cname" placeholder="π.χ. Γιώργος Παπαδόπουλος">
      </div>
      <div class="fg">
        <label class="fl" id="l-age">Ηλικία συμβαλλόμενου (18–75)</label>
        <input class="fi" type="number" id="age" min="18" max="75" placeholder="π.χ. 45">
        <div class="fh" id="l-age-hint">Ηλικία ασφαλισμένου: 1 μήνας – 70 ετών</div>
      </div>
      <div class="fg">
        <label class="fl" id="l-cap">Εφάπαξ κεφάλαιο (€) — ελάχ. €5.000</label>
        <input class="fi" type="number" id="cap" min="5000" placeholder="π.χ. 50000">
      </div>

      <div class="fg">
        <label class="fl" id="l-period">Χρονικό διάστημα ανάλυσης</label>
        <div class="period-sel">
          <button class="ps-btn" onclick="setPeriod(10,this)">10 <span id="yr-lbl-10">έτη</span></button>
          <button class="ps-btn" onclick="setPeriod(15,this)">15 <span id="yr-lbl-15">έτη</span></button>
          <button class="ps-btn active" onclick="setPeriod(20,this)">20 <span id="yr-lbl-20">έτη</span></button>
          <button class="ps-btn" onclick="setPeriod(25,this)">25 <span id="yr-lbl-25">έτη</span></button>
        </div>
      </div>

      <div class="sw">
        <label class="fl" id="l-infl">Πληθωρισμός (%)</label>
        <div class="sr">
          <input type="range" id="infl" min="1" max="6" step="0.5" value="3">
          <span class="sv" id="inflv">3%</span>
        </div>
      </div>

      <div class="fg">
        <label class="fl" id="l-strat">Επενδυτική στρατηγική</label>
        <select class="fi" id="strat">
          <option value="" id="so0">— Επιλογή —</option>
          <option value="conservative" id="so1">Conservative (80% ομόλογα / 20% μετοχές)</option>
          <option value="balanced" id="so2">Balanced (50% / 50%)</option>
          <option value="appreciation" id="so3">Appreciation (10% / 90%)</option>
          <option value="custom" id="so4">Προσαρμοσμένη επιλογή</option>
        </select>
      </div>

      <button class="gb" id="goBtn" onclick="calc()">⚡ Δημιουργία παρουσίασης</button>
    </div>

    <div class="exp-panel" id="expPanel">
      <div class="ep-title" id="ep-title">📤 Εξαγωγή παρουσίασης</div>
      <div class="ep-btns">
        <button class="ep-btn ep-pptx" id="btnP" onclick="exportPPTX()">📊 PowerPoint (.pptx)</button>
        <button class="ep-btn ep-pdf"  id="btnF" onclick="exportPDF()">📄 PDF</button>
      </div>
    </div>
  </div>

  <div id="out">
    <div class="placeholder">
      <div class="phi">📊</div>
      <div class="pht" id="ph-t">Η παρουσίαση σας περιμένει</div>
      <div class="phs" id="ph-s">Συμπληρώστε τα στοιχεία και πατήστε «Δημιουργία παρουσίασης»</div>
    </div>
  </div>
</div>

function proj(c,r,ap,Y){let v=c,a=[v];for(let y=1;y<=Y;y++){const cr=y<=10?.02:.015;v=v*(1+r)-25-v*cr-ap;if(v<0)v=0;a.push(v);}return a;}
function inflArr(c,r,Y){let a=[c];for(let y=1;y<=Y;y++)a.push(c/Math.pow(1+r,y));return a;}

function calc(){
  const name=document.getElementById('cname').value.trim()||(LANG==='el'?'Πελάτης':'Client');

  if(!age||age<18||age>75){alert(LANG==='el'?'Παρακαλώ εισάγετε ηλικία 18–75':'Please enter age 18–75');return;}

  const pct=PCT[age]||PCT[75];
  const mpay=cap*pct, apay=mpay*12;
  const sd=SC_RATES.map(r=>proj(cap,r,apay,Y));
  const id=inflArr(cap,inflr,Y);
  const lbs=Array.from({length:Y+1},(_,i)=>tx.chartYearLabel+' '+i);
  const tp=apay*Y;

    </div>
  </div>

  <div class="pb">

      <div class="pamt">${fmt(mpay)}</div>

  </div>

  <div class="st">${tx.scenTitle} <span class="badge">${Y} ${tx.years}</span></div>
  <div class="scg">
    ${[0,1,2].map(i=>{const fv=Math.max(0,sd[i][Y]);const cls=['low','mid','hi'][i];return`<div class="sc ${cls}">

// ══════════════════════════════════
// PDF EXPORT
// ══════════════════════════════════
async function exportPDF(){
  if(!LD)return;
  const btn=document.getElementById('btnF');
  btn.disabled=true;btn.textContent='⏳ ...';
  const{jsPDF}=window.jspdf;
  const el=document.getElementById('printArea');
  try{
    const canvas=await html2canvas(el,{scale:1.6,useCORS:true,backgroundColor:'#f5f4f1',width:el.scrollWidth,height:el.scrollHeight,scrollX:0,scrollY:0});
    const imgW=canvas.width,imgH=canvas.height;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const pdfW=pdf.internal.pageSize.getWidth(),pdfH=pdf.internal.pageSize.getHeight();
    const ratio=pdfW/imgW,pageHpx=pdfH/ratio;
    let yOff=0,page=0;
    while(yOff<imgH){
      if(page>0)pdf.addPage();
      const pc=document.createElement('canvas');pc.width=imgW;pc.height=Math.min(pageHpx,imgH-yOff);
      pc.getContext('2d').drawImage(canvas,0,-yOff);
      pdf.addImage(pc.toDataURL('image/jpeg',.9),'JPEG',0,0,pdfW,pc.height*ratio,undefined,'FAST');
      yOff+=pageHpx;page++;
    }
    const safe=LD.name.replace(/[^a-zA-Z0-9Α-Ωα-ω]/g,'_');
    pdf.save(`NN_SingleFlex_${safe}_${LD.Y}yr.pdf`);
  }catch(e){alert('PDF error: '+e.message);}
  btn.disabled=false;btn.innerHTML='📄 PDF';
}
